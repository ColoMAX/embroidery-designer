<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embroidery Design Tool</title>
  <link rel="icon" href="https://github.com/ColoMAX.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <h1>Embroidery Design Tool</h1>
    <p>Upload an image, resize it, reduce colors, and download for embroidery patterns.</p>

    <div class="upload-section">
      <input type="file" id="imageInput" accept="image/*">
      <label for="imageInput">Choose an image</label>
    </div>

    <div class="controls" id="controls" style="display: none;">
      <div class="size-controls">
        <h3>Resize Image</h3>
        <label for="width">Stitches width:</label>
        <input type="number" id="width" min="1" value="50">
        <label for="height">Stitches height:</label>
        <input type="number" id="height" min="1" value="50">
        <br>
        <input type="checkbox" id="maintainAspect" checked>
        <label for="maintainAspect">Maintain aspect ratio</label>
      </div>

      <div class="color-controls">
        <h3>Color Options</h3>
        <div class="color-mode">
          <input type="radio" id="paletteMode" name="colorMode" value="palette" checked>
          <label for="paletteMode">Use predefined palette</label>
          <select id="paletteSelect">
            <option value="embroidery">Embroidery Colors</option>
            <option value="basic">Basic Colors</option>
            <option value="grayscale">Grayscale</option>
          </select>
        </div>
        <div class="color-mode">
          <input type="radio" id="numColorsMode" name="colorMode" value="numColors">
          <label for="numColorsMode">Number of colors:</label>
          <input type="number" id="numColors" min="2" max="256" value="16">
        </div>
                <br>
                <input type="checkbox" id="showIndicators">
                <label for="showIndicators">Show color indicators</label>
            </div>

            <button id="processBtn">Process Image</button>
        </div>
      <h3>Preview</h3>
      <canvas id="previewCanvas"></canvas>
      <div class="actions">
        <button id="downloadBtn">Download PNG</button>
        <button id="printBtn">Print</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/rgbquant@1.1.2/src/rgbquant.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
